<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title>Productos</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<!-- Navbar -->
	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container-fluid mt-4">
		<div class="row">
			<!-- Sidebar: Categorías -->
			<div class="col-md-3">
				<h5 class="mb-3">Categorías</h5>
				<ul class="list-group">
					<li th:each="categoria : ${categorias}" class="list-group-item">
						<a th:href="@{/productos/categoria(idCategoria=${categoria.idCategoria})}" 
						   th:text="${categoria.nombre}" style="text-decoration: none;"></a>
					</li>
				</ul>
			</div>

			<!-- Contenido principal -->
			<div class="col-md-9">
				<h3 th:if="${categoriaSeleccionada != null}" class="mb-4">Categoría: <span th:text="${categoriaSeleccionada}"></span></h3>
				<h3 th:if="${categoriaSeleccionada == null}" class="mb-4">Productos destacados</h3>

				<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
					<div th:each="producto : ${productos}" class="col">
						<a th:href="@{/verDetalleProducto/{id}(id=${producto.idProducto})}" style="text-decoration: none; color: inherit;">
							<div class="card h-100 shadow-sm">
								<img th:src="${producto.imagen" class="card-img-top" th:alt="${producto.nombre}">
								<div class="card-body">
									<h5 class="card-title" th:text="${producto.nombre}">Nombre del producto</h5>
								</div>
								<div class="card-footer">
									<strong>$<span th:text="${producto.precio}">0.00</span></strong>
								</div>
							</div>
						</a>
					</div>
				</div>

				<p th:if="${#lists.isEmpty(productos)}" class="mt-4">No hay productos disponibles.</p>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
