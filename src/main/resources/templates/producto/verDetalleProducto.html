<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title th:text="${producto.nombre}">Detalle Producto</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="row">
			<div class="col-md-6">
				<img th:src="${producto.imagen}" class="img-fluid" alt="Imagen producto">
			</div>
			<div class="col-md-6">
				<h2 th:text="${producto.nombre}">Nombre del producto</h2>
				<p th:text="${producto.descripcion}">Descripción</p>
				<h4>$<span th:text="${producto.precio}">0.00</span></h4>

				<form th:action="@{/carritoAgregar}" method="post">
					<input type="hidden" name="idProducto" th:value="${producto.idProducto}" />
					<div class="mb-3">
						<label for="cantidad" class="form-label">Cantidad</label>
						<input type="number" class="form-control" name="cantidad" id="cantidad" value="1" min="1"
							max="${producto.stock}" />
					</div>
					<button type="submit" class="btn btn-success">Agregar al carrito</button>
				</form>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS Bundle con Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
