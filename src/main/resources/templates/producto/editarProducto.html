<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Editar Producto - MundoTech</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6">

				<div class="card shadow-sm">
					<div class="card-body p-4">

						<h3 class="mb-4 text-center">Editar Producto</h3>

						<form th:action="@{/editarProducto}" method="post" enctype="multipart/form-data">
							<input type="hidden" name="id" th:value="${producto.idProducto}" />

							<div class="mb-3">
								<label for="nombre" class="form-label">Nombre</label>
								<input type="text" class="form-control" id="nombre" name="nombre" th:value="${producto.nombre}" required />
							</div>

							<div class="mb-3">
								<label for="descripcion" class="form-label">Descripción</label>
								<textarea class="form-control" id="descripcion" name="descripcion" required th:text="${producto.descripcion}"></textarea>
							</div>

							<div class="mb-3">
								<label for="precio" class="form-label">Precio</label>
								<input type="number" step="0.01" class="form-control" id="precio" name="precio" th:value="${producto.precio}" required />
							</div>

							<div class="mb-3">
								<label for="imagen" class="form-label">Imagen (URL)</label>
								<input type="file" class="form-control" id="imagen" name="imagen" th:value="${producto.imagen}" />
							</div>

							<div class="mb-3">
								<label for="stock" class="form-label">Stock</label>
								<input type="number" class="form-control" id="stock" name="stock" th:value="${producto.stock}" required />
							</div>

							<div class="mb-3">
								<label for="idCategoria" class="form-label">Categoría</label>
								<select class="form-select" id="idCategoria" name="idCategoria" required>
									<option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombre}"
										th:selected="${cat.idCategoria == producto.categoria.idCategoria}">Categoría</option>
								</select>
							</div>

							<div class="d-flex justify-content-between gap-2">
								<button type="submit" class="btn btn-primary w-100">Actualizar</button>
								<a th:href="@{/listaProductos}" class="btn btn-outline-secondary w-100">Volver</a>
							</div>

						</form>

					</div>
				</div>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
