<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Lista de Productos - MundoTech</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Lista de Productos</h2>
			<a th:href="@{/crearProducto}" class="btn btn-primary">Nuevo Producto</a>
		</div>

		<div class="card shadow-sm">
			<div class="card-body">
				<table class="table table-bordered table-striped">
					<thead class="table-dark">
						<tr>
							<th>ID</th>
							<th>Nombre</th>
							<th>Descripción</th>
							<th>Precio</th>
							<th>Stock</th>
							<th>Categoría</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="prod : ${productos}">
							<td th:text="${prod.idProducto}"></td>
							<td th:text="${prod.nombre}"></td>
							<td th:text="${prod.descripcion}"></td>
							<td th:text="${prod.precio}"></td>
							<td th:text="${prod.stock}"></td>
							<td th:text="${prod.categoria.nombre}"></td>
							<td>
								<a th:href="@{'/editarProducto'(id=${prod.idProducto})}"
									class="btn btn-warning btn-sm">Editar</a>
								<a th:href="@{'/eliminarProducto'(id=${prod.idProducto})}"
									class="btn btn-danger btn-sm">Eliminar</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
