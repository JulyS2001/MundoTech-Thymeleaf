<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8">
	<title>Productos por Categoría</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<h1 class="mb-4">Productos por Categoría</h1>

		<div class="jumbotron text-center">

			<div th:each="categoria : ${categorias}" class="mb-5">
				<h3 th:text="${categoria.nombre}" class="mb-3"></h3>
				<div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
					<div th:each="producto : ${categoria.productos}" class="col">
						<a th:href="@{/verDetalleProducto/{id}(id=${producto.idProducto})}"
							style="text-decoration: none; color: inherit;">
							<div class="card h-100">
								<img th:src="${producto.imagen}" class="card-img-top"
									th:alt="${producto.nombre}">
								<div class="card-body">
									<h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
								</div>
								<div class="card-footer">
									<strong>$<span th:text="${producto.precio}"></span></strong>
								</div>
							</div>
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
