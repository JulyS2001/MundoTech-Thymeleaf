<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6 col-lg-5">

				<div class="card shadow-sm">
					<div class="card-body p-4">

						<h3 class="mb-4 text-center">Iniciar sesión</h3>

						<!-- Mensaje de error o éxito -->
						<div th:if="${mensaje}" class="alert alert-info" th:text="${mensaje}"></div>

						<form th:action="@{/login}" method="post">

							<div class="mb-3">
								<label for="email" class="form-label">Correo electrónico</label>
								<input type="email" id="email" name="username" class="form-control"
									placeholder="tu@email.com" required autofocus>
							</div>

							<div class="mb-3">
								<label for="password" class="form-label">Contraseña</label>
								<input type="password" id="password" name="password" class="form-control"
									placeholder="Contraseña" required>
							</div>
							<div class="d-flex justify-content-between gap-2">
								<button type="submit" class="btn btn-primary w-100">Ingresar</button>
								<a th:href="@{/registro}" class="btn btn-outline-secondary w-100">Registrarse</a>
							</div>
						</form>

					</div>
				</div>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
