<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Registro - MundoTech</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6 col-lg-5">

				<div class="card shadow-sm">
					<div class="card-body p-4">

						<h3 class="mb-4 text-center">Registro de Usuario</h3>

						<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

						<form th:action="@{/registro}" method="post">

							<div class="mb-3">
								<label for="nombre" class="form-label">Nombre de Usuario</label>
								<input type="text" class="form-control" id="nombre" name="nombre" required autofocus />
							</div>

							<div class="mb-3">
								<label for="email" class="form-label">Correo electrónico</label>
								<input type="email" class="form-control" id="email" name="email" required />
							</div>

							<div class="mb-3">
								<label for="contrasenia" class="form-label">Contraseña</label>
								<input type="password" class="form-control" id="contrasenia" name="contrasenia"
									required />
							</div>

							<div class="d-flex justify-content-between gap-2">
								<button type="submit" class="btn btn-primary w-100">Registrarse</button>
								<a th:href="@{/login}" class="btn btn-outline-secondary w-100">Ingresar</a>
							</div>
						</form>

					</div>
				</div>

			</div>
		</div>
	</div>

	<!-- Bootstrap JS Bundle con Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
