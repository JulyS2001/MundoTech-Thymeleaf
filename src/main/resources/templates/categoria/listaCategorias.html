<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Categorías - MundoTech</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h2>Categorías</h2>
			<a th:href="@{/crearCategoria}" class="btn btn-primary">Nueva Categoría</a>
		</div>

		<div class="card shadow-sm">
			<div class="card-body">
				<table class="table table-bordered table-striped">
					<thead class="table-dark">
						<tr>
							<th>ID</th>
							<th>Nombre</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="categoria : ${categorias}">
							<td th:text="${categoria.idCategoria}"></td>
							<td th:text="${categoria.nombre}"></td>
							<td>
								<a th:href="@{/editarCategoria(id=${categoria.idCategoria})}" class="btn btn-sm btn-warning">Editar</a>
								<a th:href="@{/eliminarCategoria(id=${categoria.idCategoria})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de eliminar esta categoría?')">Eliminar</a>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
