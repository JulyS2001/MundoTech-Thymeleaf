<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Inicio - MundoTech</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

	<div th:replace="componentes/navbar :: navbar"></div>

	<div class="container mt-5">
		<div class="jumbotron text-center">
			<h1 class="display-4">¡Bienvenido a MundoTech!</h1>
			<p class="lead">La mejor plataforma para comprar productos online.</p>
			<hr class="my-4" />
			<p>Si aún no tienes una cuenta, regístrate ahora para comenzar.</p>
			<a class="btn btn-primary" th:href="@{/registro}" role="button">Registrarse</a>
			<hr class="my-4" />

			<div class="container mt-5">
				<h3 class="mb-4">Conocé nuestros productos destacados</h3>
				<div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
					<div th:each="producto, iterStat : ${productos}" th:if="${iterStat.index} < 4" class="col">
						<a th:href="@{/verDetalleProducto/{id}(id=${producto.idProducto})}"
							style="text-decoration: none; color: inherit;">
							<div class="card h-100">
								<img th:src="${producto.imagen}" class="card-img-top"
									th:alt="${producto.nombre}" />
								<div class="card-body">
									<h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
								</div>
								<div class="card-footer">
									<strong>$<span th:text="${producto.precio}"></span></strong>
								</div>
							</div>
						</a>
					</div>
				</div>
			</div>

		</div>
	</div>
	
	<div th:replace="componentes/footer :: footer"></div>

	<!-- Bootstrap JS Bundle con Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
