<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis Compras - MundoTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

<div th:replace="componentes/navbar :: navbar"></div>

<div class="container mt-5">
    <h2 class="mb-4">Mis Compras</h2>

    <div th:if="${#lists.isEmpty(pedidos)}">
        <p>No has realizado compras aún.</p>
    </div>

    <div th:if="${!#lists.isEmpty(pedidos)}">
        <div th:each="pedido : ${pedidos}" class="mb-5 pb-4 border-bottom">
            <h5 class="mb-3">Pedido #<span th:text="${pedido.idPedido}"></span></h5>

            <div class="row g-3" th:each="pp : ${pedido.pedidoProductos}">
                <div class="col-md-2">
                    <img th:src="@{/images/{img}(img=${pp.producto.imagen})}" class="img-fluid rounded" alt="Imagen del producto" />
                </div>
                <div class="col-md-10">
                    <h6 th:text="${pp.producto.nombre}"></h6>
                    <p class="mb-1">Precio: $<span th:text="${pp.producto.precio}"></span></p>
                </div>
            </div>

            <div class="mt-3 text-end">
                <strong>Total del pedido: $<span th:text="${pedido.total}"></span></strong>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
